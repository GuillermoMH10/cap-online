{% extends "portal/base.html" %}

{% block title %}Calendario | Portal{% endblock %}
{% block page_title %}Calendario{% endblock %}

{% block content %}

<style>
/* ── Responsive para esta página ── */
@media (max-width: 768px) {
  /* Grids de 2+ cols → 1 col */
  [style*="grid-template-columns"],
  .grid, .cards-grid, .stats-grid, .two-col, .dash-grid {
    grid-template-columns: 1fr !important;
  }
  /* Tablas → scroll horizontal */
  table { display: block; overflow-x: auto; white-space: nowrap; width: 100%; }
  /* Flex rows → column */
  .row, .flex-row { flex-direction: column !important; }
  /* Padding reducido en cards */
  .card { padding: 12px !important; }
  /* Texto más pequeño en títulos */
  h2 { font-size: 1.4rem !important; }
  h3 { font-size: 1.15rem !important; }
}
@media (max-width: 480px) {
  .card { padding: 10px 10px !important; border-radius: 10px !important; }
  h2 { font-size: 1.2rem !important; }
}
</style>

  <div class="card">
    <h3 style="margin-bottom:8px;">Mis Citas</h3>
    <p class="muted">Todavía no tienes un módulo de citas en base de datos. Cuando lo agreguemos, aquí saldrán tus citas reales.</p>
  </div>
{% endblock %}
