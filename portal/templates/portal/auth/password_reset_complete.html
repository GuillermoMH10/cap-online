{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña actualizada | CAP Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--color-primary:#004d61;--color-secondary:#006b7d;--color-text-light:#4a5568}
    body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#1a5f6e 0%,#0d4a57 40%);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrapper{padding:2rem;width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:14px;padding:2.4rem 2rem;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.12);text-align:center}
    .logo-icon{width:64px;height:64px;background:var(--color-primary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.9rem;margin:0 auto 0.8rem}
    .card-title{font-family:'Crimson Pro',serif;color:var(--color-primary);font-size:1.4rem;margin-bottom:0.3rem}
    p{color:var(--color-text-light);line-height:1.5}
    .btn-primary{display:inline-block;margin-top:1rem;padding:12px 20px;background:var(--color-primary);color:#fff;text-decoration:none;border-radius:8px}
    .btn-primary:hover{background:var(--color-secondary)}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="logo-icon">Ψ</div>
      <h2 class="card-title">Contraseña actualizada</h2>
      <p>Tu contraseña fue cambiada correctamente. Ahora puedes iniciar sesión.</p>
      <a class="btn-primary" href="{% url 'login' %}">Iniciar sesión</a>
    </div>
  </div>
</body>
</html>
