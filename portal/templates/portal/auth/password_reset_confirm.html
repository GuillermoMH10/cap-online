{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña | CAP Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--color-primary:#004d61;--color-secondary:#006b7d;--color-border:#d1dce6;--color-text-light:#4a5568}
    body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#1a5f6e 0%,#0d4a57 40%);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrapper{padding:2rem;width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:14px;padding:2.4rem 2rem;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,0.12);text-align:center}
    .logo-icon{width:64px;height:64px;background:var(--color-primary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.9rem;margin:0 auto 0.8rem}
    .card-title{font-family:'Crimson Pro',serif;color:var(--color-primary);font-size:1.6rem;margin-bottom:0.25rem}
    .card-subtitle{color:var(--color-text-light);margin-bottom:1.2rem}
    form{width:100%;text-align:left}
    .field{margin-top:0.6rem}
    label{display:block;font-weight:600;margin-bottom:0.35rem}
    input{width:100%;padding:0.9rem 1rem;border:1.5px solid var(--color-border);border-radius:8px;font-size:1rem;margin-bottom:0.8rem}
    .btn-primary{display:block;width:100%;background:var(--color-primary);color:#fff;padding:1rem;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:0.6rem}
    .btn-primary:hover{background:var(--color-secondary)}
    .error-box{background:#fff1f2;border:1px solid #fecdd3;color:#b42318;padding:10px;border-radius:8px;margin-bottom:0.9rem}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="logo-icon">Ψ</div>
      <h2 class="card-title">Nueva contraseña</h2>
      <p class="card-subtitle">Escribe tu nueva contraseña.</p>

      <form method="POST">
        {% csrf_token %}

        {% if form.errors %}
          <div class="error-box">{{ form.errors }}</div>
        {% endif %}

        {{ form.as_p }}

        <button class="btn-primary" type="submit">Guardar contraseña</button>
      </form>
    </div>
  </div>
</body>
</html>
