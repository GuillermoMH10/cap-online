{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña restablecida | Centro de Atención Psicológica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Work Sans', sans-serif;
      background: linear-gradient(135deg, #1a5f6e 0%, #0d4a57 40%, #0a3d4a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    h2 { font-family: 'Crimson Pro', serif; font-weight: 600; }
    .card {
      background: #fff; border-radius: 14px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .icon-circle {
      width: 70px; height: 70px;
      background: #ecfdf3; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 1.2rem;
    }
    h2 { font-size: 1.9rem; color: #004d61; margin-bottom: 0.5rem; }
    p { color: #4a5568; font-size: 0.97rem; margin-bottom: 1.8rem; line-height: 1.6; }
    .btn-primary {
      display: inline-block;
      background: #004d61; color: #fff;
      padding: 0.95rem 2.5rem; border: none;
      border-radius: 8px; font-family: 'Work Sans', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      background: #006b7d;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,77,97,0.25);
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon-circle">✅</div>
  <h2>¡Contraseña restablecida!</h2>
  <p>Tu contraseña ha sido guardada exitosamente.<br>Ya puedes iniciar sesión con tu nueva contraseña.</p>
  <a class="btn-primary" href="{% url 'login' %}">Iniciar sesión</a>
</div>
</body>
</html>
