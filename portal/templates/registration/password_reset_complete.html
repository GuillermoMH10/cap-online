{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña Cambiada | Centro de Atención Psicológica</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-primary: #004d61;
      --color-secondary: #006b7d;
      --color-teal-bg: #1a5f6e;
      --color-light: #f4f7f9;
      --color-white: #ffffff;
      --color-text: #1a2332;
      --color-text-light: #4a5568;
      --color-success-bg: #ecfdf3;
      --color-success-border: #abefc6;
      --color-success-text: #067647;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Work Sans', sans-serif;
      line-height: 1.7;
      color: var(--color-text);
      background: linear-gradient(135deg, #1a5f6e 0%, #0d4a57 40%, #0a3d4a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1, h2, h3 {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      line-height: 1.2;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 3.5rem 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .status-icon {
      width: 80px;
      height: 80px;
      background: var(--color-success-bg);
      border: 1px solid var(--color-success-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-success-text);
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }

    .card-title {
      font-size: 2rem;
      color: var(--color-primary);
      margin-bottom: 1rem;
    }

    .card-text {
      font-size: 1rem;
      color: var(--color-text-light);
      margin-bottom: 2rem;
      padding: 0 10px;
    }

    .btn-primary {
      display: inline-block;
      width: 100%;
      background: var(--color-primary);
      color: #fff;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      background: var(--color-secondary);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 77, 97, 0.25);
    }

    @media (max-width: 520px) {
      body {
        padding: 1rem;
      }
      .card {
        padding: 2.5rem 1.2rem;
      }
      .card-title {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="status-icon">✓</div>
  <h2 class="card-title">Contraseña Guardada</h2>
  <p class="card-text">
    Tu contraseña ha sido restablecida exitosamente. Ahora puedes volver a ingresar usando tu nueva clave.
  </p>

  <a class="btn-primary" href="{% url 'login' %}">Iniciar Sesión</a>
</div>

</body>
</html>
