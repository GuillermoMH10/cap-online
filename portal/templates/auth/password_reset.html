<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            width:400px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#1f6f5f;
            margin-bottom:20px;
        }

        p{
            color:#555;
            margin-bottom:20px;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:20px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#1f6f5f;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#185548;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            color:#1f6f5f;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Recuperar contraseña</h2>

    <p>
        Ingresa tu correo electrónico y te enviaremos instrucciones
        para restablecer tu contraseña.
    </p>

    <form method="POST">
        {% csrf_token %}

        {{ form.email }}

        <button type="submit">
            Enviar correo
        </button>
    </form>

    <a class="back" href="{% url 'login' %}">
        Volver al inicio de sesión
    </a>

</div>

</body>
</html>
