<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo enviado</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            width:420px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h2{
            color:#1f6f5f;
        }

        p{
            color:#555;
            line-height:1.5;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#1f6f5f;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }

        a:hover{
            background:#185548;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Correo enviado</h2>

    <p>
        Si el correo está registrado en el sistema, recibirás un enlace
        para restablecer tu contraseña.
    </p>

    <a href="{% url 'login' %}">Volver al inicio de sesión</a>
</div>

</body>
</html>
