{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña | Centro de Atención Psicológica</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    :root {
      --color-primary: #004d61;
      --color-secondary: #006b7d;
      --color-teal-bg: #1a5f6e;
      --color-light: #f4f7f9;
      --color-white: #ffffff;
      --color-text: #1a2332;
      --color-text-light: #4a5568;
      --color-border: #d1dce6;
      --color-danger-bg: #fff1f2;
      --color-danger-border: #fecdd3;
      --color-danger-text: #b42318;
      --color-success-bg: #ecfdf3;
      --color-success-border: #abefc6;
      --color-success-text: #067647;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Work Sans', sans-serif;
      line-height: 1.7;
      color: var(--color-text);
      background: linear-gradient(135deg, #1a5f6e 0%, #0d4a57 40%, #0a3d4a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1, h2, h3 {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      line-height: 1.2;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      background: var(--color-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      margin: 0 auto 1.2rem;
    }

    .card-title {
      font-size: 1.9rem;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }

    .card-subtitle {
      font-size: 0.95rem;
      color: var(--color-text-light);
      margin-bottom: 1.8rem;
    }

    .messages {
      display: grid;
      gap: 10px;
      margin-bottom: 1rem;
      text-align: left;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .msg.error,
    .msg.danger {
      background: var(--color-danger-bg);
      border-color: var(--color-danger-border);
      color: var(--color-danger-text);
    }

    .msg.success {
      background: var(--color-success-bg);
      border-color: var(--color-success-border);
      color: var(--color-success-text);
    }

    .field {
      margin-top: 1.1rem;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.92rem;
      margin-bottom: 0.45rem;
      color: var(--color-text);
    }

    input[type="email"] {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Work Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: var(--color-text);
      background: #fff;
    }

    input[type="email"]::placeholder {
      color: #aab4be;
    }

    input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(0, 77, 97, 0.10);
    }

    .input-help {
      margin-top: 0.35rem;
      font-size: 0.82rem;
      color: var(--color-text-light);
      text-align: left;
    }

    .btn-primary {
      display: block;
      width: 100%;
      background: var(--color-primary);
      color: #fff;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 1.5rem;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--color-secondary);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 77, 97, 0.25);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--color-text-light);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
    }

    .back-link:hover {
      color: var(--color-primary);
      text-decoration: underline;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 520px) {
      body {
        padding: 1rem;
      }
      .card {
        padding: 2rem 1.2rem;
      }
      .card-title {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-icon">Ψ</div>
  <h2 class="card-title">Recuperar Acceso</h2>
  <p class="card-subtitle">Ingresa tu correo registrado para enviarte las instrucciones.</p>

  <div id="messageBox" class="messages" style="display: none;"></div>

  <form id="resetForm" style="text-align:left;" novalidate>
    {% csrf_token %}

    <div class="field">
      <label for="email">Correo electrónico</label>
      <input
        id="email"
        name="email"
        type="email"
        placeholder="correo@ejemplo.com"
        autocomplete="email"
        required
        maxlength="150"
      >
      <div class="input-help">Te enviaremos un enlace de recuperación seguro.</div>
    </div>

    <button id="submitBtn" class="btn-primary" type="submit">Enviar enlace</button>
  </form>

  <a class="back-link" href="{% url 'login' %}">← Volver al inicio de sesión</a>
</div>

<script>
  // Fallbacks estáticos con las claves reales provistas por el usuario
  const publicKey  = "{{ EMAILJS_PUBLIC_KEY }}" || "q2bawUSFByczMAn5H";
  const serviceId  = "{{ EMAILJS_SERVICE_ID }}" || "service_0p9gbdn";
  const templateId = "{{ EMAILJS_TEMPLATE_ID }}" || "template_bdlha9y";

  emailjs.init({
    publicKey: publicKey
  });

  const form = document.getElementById("resetForm");
  const msgBox = document.getElementById("messageBox");
  const submitBtn = document.getElementById("submitBtn");
  const csrfToken = document.querySelector("[name=csrfmiddlewaretoken]").value;

  function showMessage(type, text) {
    msgBox.style.display = "grid";
    msgBox.innerHTML = `<div class="msg ${type}">${text}</div>`;
  }

  function setLoading(loading) {
    if (loading) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Enviando...';
    } else {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Enviar enlace';
    }
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();

    if (!email) {
      showMessage("error", "Por favor, ingresa tu correo electrónico.");
      return;
    }

    setLoading(true);
    msgBox.style.display = "none";

    try {
      // 1. Obtener token y URL segura de Django
      const response = await fetch("{% url 'password_reset_generate' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken,
        },
        body: JSON.stringify({ email: email })
      });

      const data = await response.json();

      if (!data.ok || !data.found) {
        showMessage("success", "Si el correo está registrado, recibirás un mensaje de recuperación.");
        setLoading(false);
        return;
      }

      // 2. Enviar usando EmailJS pasando publicKey en los parámetros de opción (v4)
      await emailjs.send(
        serviceId,
        templateId,
        {
          to_email: email,
          email: email,
          user_email: email,
          to_name: data.nombre || email,
          reset_link: data.reset_url,
          reset_url: data.reset_url,
          link: data.reset_url,
          site_name: "Centro de Atención Psicológica"
        },
        {
          publicKey: publicKey
        }
      );

      window.location.href = "{% url 'password_reset_done' %}";

    } catch (error) {
      console.error("Error al enviar con EmailJS:", error);
      const detail = error?.text || error?.message || "Respuesta no válida del servicio de correo";
      showMessage("error", `No se pudo enviar el correo: ${detail}`);
      setLoading(false);
    }
  });
</script>

</body>
</html>
